name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python run.py

      - name: Run data quality tests
        run: pytest -q

      - name: Check generated outputs are committed
        run: |
          if ! git diff --quiet -- data/processed reports; then
            echo "::error::Generated files differ from committed versions. Run 'python run.py' and commit the result."
            git --no-pager diff --stat -- data/processed reports
            exit 1
          fi
